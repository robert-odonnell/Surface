name: Release

# Triggered when a version tag is pushed. Builds in Release config, packs
# Surface.Generator + Surface.Runtime, and pushes the .nupkg files to NuGet.org
# using NuGet's Trusted Publishing — GitHub mints a short-lived OIDC token, the
# NuGet/login action exchanges it for a temporary API key, and the push step
# consumes that key. No long-lived secrets in the repo; the trust policy lives
# on NuGet (configured per package + per workflow + per branch ref).
#
# Required: the NUGET_USER repository secret (the NuGet username that owns the
# trusted-publishing policy for these packages).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC token minting
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Surface.slnx

      - name: Build (Release)
        run: dotnet build Surface.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Surface.Tests/Surface.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack Surface.slnx --configuration Release --no-build --output ./artifacts

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
