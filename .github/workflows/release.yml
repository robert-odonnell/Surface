name: Release

# Triggered when a version tag is pushed. Builds in Release config, packs
# Disruptor.Surface.Generator + Disruptor.Surface.Runtime, and pushes the .nupkg files to NuGet.org.
# Uses a long-lived API key stored in the NUGET_API_KEY repo secret.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Disruptor.Surface.slnx

      - name: Build (Release)
        run: dotnet build Disruptor.Surface.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Disruptor.Surface.Tests/Disruptor.Surface.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack Disruptor.Surface.slnx --configuration Release --no-build --output ./artifacts

      - name: Publish to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
